<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>FAQ</title></head><body class="admin-page"><header class="admin-header"><strong>Häufige Fragen</strong><a href="{{ url_for('knowledge_dashboard') }}">Wissensverwaltung</a></header><main class="admin-main"><section class="admin-panel"><form method="post" class="settings-grid"><label>Assistent<select name="assistant"><option>Gloria</option><option>Fidel</option><option>Pia</option></select></label><label>Kategorie<input name="category" value="Allgemein"></label><label class="wide">Frage<input name="question" required></label><label class="wide">Antwort<textarea name="answer" rows="5" required></textarea></label><button class="btn">Speichern</button></form></section><section class="faq-grid">{% for r in rows %}<article><span>{{ r.assistant }} · {{ r.category }}</span><h3>{{ r.question }}</h3><p>{{ r.answer }}</p></article>{% endfor %}</section></main></body></html>
