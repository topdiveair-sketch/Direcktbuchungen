<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Medienbibliothek</title></head><body class="admin-page"><header class="admin-header"><strong>Medienbibliothek</strong><a href="{{ url_for('knowledge_dashboard') }}">Wissensverwaltung</a></header><main class="admin-main"><section class="admin-panel"><form method="post" enctype="multipart/form-data" class="settings-grid"><label>Titel<input name="title" required></label><label>Kategorie<select name="category"><option>Zimmer</option><option>Haus</option><option>Wachau</option><option>Windis</option><option>Marketing</option><option>Presse</option><option>Dokument</option></select></label><label class="wide">Datei<input type="file" name="file" required></label><label class="wide">Beschreibung<input name="description"></label><label class="wide">Bildrechte/Quelle<input name="rights_note"></label><button class="btn">Hochladen</button></form></section><section class="media-grid">{% for r in rows %}<article><span>{{ r.category }}</span><h3>{{ r.title }}</h3><p>{{ r.description }}</p><small>{{ r.original_name }} · {{ r.rights_note }}</small><a href="{{ url_for('media_download',item_id=r.id) }}">Herunterladen</a></article>{% else %}<p>Noch keine Medien.</p>{% endfor %}</section></main></body></html>
