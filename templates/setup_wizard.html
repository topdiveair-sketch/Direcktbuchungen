<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Einrichtungsassistent</title></head><body class="admin-page"><header class="admin-header"><div><strong>Einrichtungsassistent</strong><small>{{ completed }} von {{ total }} erledigt</small></div><a href="{{ url_for('quality_center') }}">Qualitätszentrum</a></header><main class="admin-main"><section class="setup-progress"><div style="width:{{ (completed/total*100) if total else 0 }}%"></div></section><section class="setup-list">{% for r in rows %}<form method="post" class="setup-item {% if r.completed %}complete{% endif %}"><input type="hidden" name="key" value="{{ r.key }}"><label class="switch-row"><input type="checkbox" name="completed" {% if r.completed %}checked{% endif %}><strong>{{ r.key|replace('_',' ')|title }}</strong></label><input name="note" value="{{ r.note }}" placeholder="Notiz"><button>Speichern</button></form>{% endfor %}</section></main></body></html>
