<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Marketing-Center</title></head><body class="admin-page"><header class="admin-header"><strong>Marketing-Center</strong><a href="{{ url_for('os_dashboard') }}">OS-Dashboard</a></header><main class="admin-main"><section class="admin-panel"><h2>Beitrag vorbereiten</h2><form method="post" class="settings-grid"><label>Kanal<select name="channel"><option>Google</option><option>Facebook</option><option>Instagram</option><option>Newsletter</option><option>Presse</option></select></label><label>Titel<input name="title" required></label><label>Status<select name="status"><option>Idee</option><option>Entwurf</option><option>Geplant</option><option>Veröffentlicht</option></select></label><label>Geplant für<input type="date" name="planned_date"></label><label class="wide">Text<textarea name="text" rows="8" required></textarea></label><button class="btn">Speichern</button></form></section><section class="admin-panel">{% for i in ideas %}<div class="marketing-card"><div><strong>{{ i.channel }} · {{ i.title }}</strong><span>{{ i.status }}{% if i.planned_date %} · {{ i.planned_date }}{% endif %}</span></div><p>{{ i.text }}</p></div>{% else %}<p>Noch keine Beiträge vorbereitet.</p>{% endfor %}</section></main></body></html>
