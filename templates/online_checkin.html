<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>{{ t.get('checkin_title','Online-Check-in') }}</title></head><body class="plain-page"><main class="portal"><div class="admin-panel"><h1>{{ t.get('welcome','Willkommen') }}, {{ booking.first_name }}!</h1><p>{{ booking.room }} · {{ booking.arrival }} bis {{ booking.departure }}</p><div class="lang-links"><a href="?lang=de">DE</a> · <a href="?lang=en">EN</a> · <a href="?lang=cs">CZ</a> · <a href="?lang=sk">SK</a></div><form method="post" class="settings-grid"><label>Sprache<select name="language"><option value="de">Deutsch</option><option value="en">English</option><option value="cs">Čeština</option><option value="sk">Slovenčina</option></select></label><label>Land<input name="country" value="{{ booking.country }}"></label><label>PLZ<input name="postal_code" value="{{ booking.postal_code }}"></label><label>Ort<input name="city" value="{{ booking.city }}"></label><label class="wide">Straße und Hausnummer<input name="street" value="{{ booking.street }}"></label><label>Dokumentart<select name="document_type"><option>Reisepass</option><option>Personalausweis</option></select></label><label>Dokumentnummer<input name="document_number" value="{{ booking.document_number }}"></label><label>Kennzeichen<input name="vehicle_plate" value="{{ booking.vehicle_plate }}"></label><label>Ankunftszeit<input type="time" name="arrival_time" value="{{ booking.arrival_time }}"></label><button class="btn">{{ t.get('save','Speichern') }}</button></form>{% if booking.checked_in %}<div class="notice">Online-Check-in bereits abgeschlossen.</div>{% endif %}</div></main></body></html>
