<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Wartung</title></head><body class="admin-page"><header class="admin-header"><strong>Wartungsplan</strong><a href="{{ url_for('smart_dashboard') }}">Zurück</a></header><main class="admin-main"><section class="admin-panel"><h2>Wartung hinzufügen</h2><form method="post" class="settings-grid"><label>Zimmer<select name="room"><option value="">Allgemein</option>{% for room in rooms %}<option>{{ room }}</option>{% endfor %}</select></label><label>Titel<input name="title" required></label><label>Intervall Tage<input type="number" name="interval_days" value="30"></label><label>Nächster Termin<input type="date" name="next_due" required></label><label class="wide">Notiz<input name="note"></label><button class="btn">Hinzufügen</button></form></section><section class="admin-panel">{% for r in rows %}<div class="season-row"><span><strong>{{ r.title }}{% if r.room %} · {{ r.room }}{% endif %}</strong><small>fällig {{ r.next_due }} · alle {{ r.interval_days }} Tage</small></span><form action="{{ url_for('maintenance_done',item_id=r.id) }}" method="post"><button>Erledigt</button></form></div>{% endfor %}</section></main></body></html>
