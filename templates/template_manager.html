<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Dokumentvorlagen</title></head><body class="admin-page"><header class="admin-header"><strong>Dokumentvorlagen</strong><a href="{{ url_for('knowledge_dashboard') }}">Wissensverwaltung</a></header><main class="admin-main"><section class="admin-panel"><h2>Vorlage speichern</h2><form method="post" class="settings-grid"><label>Schlüssel<input name="template_key" placeholder="z. B. booking_confirmation" required></label><label>Titel<input name="title" required></label><label class="wide">Betreff<input name="subject"></label><label class="wide">Text<textarea name="body" rows="12" required></textarea></label><button class="btn">Speichern</button></form></section><section class="template-grid">{% for r in rows %}<article><span>{{ r.template_key }}</span><h3>{{ r.title }}</h3><strong>{{ r.subject }}</strong><pre>{{ r.body }}</pre></article>{% endfor %}</section></main></body></html>
