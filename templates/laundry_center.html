<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Wäsche</title></head><body class="admin-page"><header class="admin-header"><strong>Gloria – Wäscheverwaltung</strong><a href="{{ url_for('smart_dashboard') }}">Zurück</a></header><main class="admin-main"><section class="laundry-grid">{% for r in rows %}<form method="post" class="admin-panel {% if r.clean_quantity<r.minimum_clean %}warning-panel{% endif %}"><input type="hidden" name="item_id" value="{{ r.id }}"><h2>{{ r.item }}</h2><label>Sauber<input type="number" name="clean_quantity" value="{{ r.clean_quantity }}"></label><label>Schmutzig<input type="number" name="dirty_quantity" value="{{ r.dirty_quantity }}"></label><label>Mindestbestand<input type="number" name="minimum_clean" value="{{ r.minimum_clean }}"></label><button class="btn">Speichern</button></form>{% endfor %}</section></main></body></html>
