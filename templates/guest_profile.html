<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Gästeprofil</title></head><body class="admin-page"><header class="admin-header"><strong>{{ guest.first_name }} {{ guest.last_name }}</strong><a href="{{ url_for('guest_database') }}">Zur Gästekartei</a></header><main class="admin-main"><section class="admin-panel"><form method="post" class="settings-grid"><label>Land<input name="country" value="{{ guest.country }}"></label><label>Lieblingszimmer<select name="preferred_room"><option value="">–</option>{% for room in rooms %}<option {% if guest.preferred_room==room %}selected{% endif %}>{{ room }}</option>{% endfor %}</select></label><label>Frühstückswunsch<input name="breakfast_preference" value="{{ guest.breakfast_preference }}"></label><label class="wide">Notizen<textarea name="notes" rows="6">{{ guest.notes }}</textarea></label><button class="btn">Speichern</button></form></section><section class="admin-panel"><h2>Buchungshistorie</h2><table class="booking-table"><tr><th>Zeitraum</th><th>Zimmer</th><th>Status</th><th>Betrag</th></tr>{% for b in bookings %}<tr><td>{{ b.arrival }} – {{ b.departure }}</td><td>{{ b.room }}</td><td>{{ b.status }}</td><td>{{ b.total }} €</td></tr>{% endfor %}</table></section></main></body></html>
