<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Windis-Center</title></head><body class="admin-page"><header class="admin-header"><strong>Windis-Center</strong><a href="{{ url_for('os_dashboard') }}">OS-Dashboard</a></header><main class="admin-main"><section class="admin-panel"><h2>Neuen Inhalt anlegen</h2><form method="post" class="settings-grid"><label>Figur<select name="character"><option>Fidel</option><option>Gloria</option><option>Pia</option></select></label><label>Kategorie<input name="category" value="Allgemein"></label><label>Titel<input name="title" required></label><label class="wide">Inhalt<textarea name="content" rows="5" required></textarea></label><button class="btn">Speichern</button></form></section><section class="windis-grid">{% for item in content %}<article class="windis-card {{ item.character|lower }}"><span>{{ item.character }}</span><h3>{{ item.title }}</h3><small>{{ item.category }}</small><p>{{ item.content }}</p></article>{% endfor %}</section></main></body></html>
