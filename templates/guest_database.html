<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Gästekartei</title></head><body class="admin-page"><header class="admin-header"><strong>Gästekartei</strong><a href="{{ url_for('os_dashboard') }}">OS-Dashboard</a></header><main class="admin-main"><section class="admin-panel"><form class="search-row"><input name="q" value="{{ query }}" placeholder="Name, E-Mail oder Telefon"><button class="btn">Suchen</button></form><div class="table-scroll"><table class="booking-table"><tr><th>Gast</th><th>Kontakt</th><th>Aufenthalte</th><th>Umsatz</th><th>Letzter Aufenthalt</th><th></th></tr>{% for g in guests %}<tr><td><strong>{{ g.first_name }} {{ g.last_name }}</strong><br><small>{{ g.country }}</small></td><td>{{ g.email }}<br>{{ g.phone }}</td><td>{{ g.stays }}</td><td>{{ '%.2f'|format(g.total_revenue) }} €</td><td>{{ g.last_stay }}</td><td><a href="{{ url_for('guest_profile',guest_id=g.id) }}">Öffnen</a></td></tr>{% else %}<tr><td colspan="6">Noch keine Gäste.</td></tr>{% endfor %}</table></div></section></main></body></html>
