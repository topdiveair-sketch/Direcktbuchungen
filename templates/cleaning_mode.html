<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Reinigung {{ run.room }}</title></head><body class="mode-page"><header class="mode-header"><div><span>Gloria – Reinigungsmodus</span><h1>{{ run.room }}</h1></div><a href="{{ url_for('host_assistant') }}">Zurück</a></header><main class="mode-main">{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}<section class="checklist">{% for i in items %}<form action="{{ url_for('cleaning_item_toggle',item_id=i.id) }}" method="post"><button class="check-item {% if i.done %}done{% endif %}"><span>{% if i.done %}✓{% else %}○{% endif %}</span><strong>{{ i.item }}</strong></button></form>{% endfor %}</section><form action="{{ url_for('cleaning_finish',run_id=run.id) }}" method="post"><button class="finish-room">Zimmer fertig & freigeben</button></form></main></body></html>
