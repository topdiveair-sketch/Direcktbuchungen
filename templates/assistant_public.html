<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>{{ assistant }}</title></head><body class="assistant-public {{ assistant|lower }}"><header><span>Die Wilden Wachauer Windis</span><h1>{{ assistant }}</h1></header><main>{% for r in rows %}<article><span>{{ r.category }}</span><h2>{{ r.title }}</h2><p>{{ r.description }}</p>{% if r.link %}<a href="{{ r.link }}" target="_blank">Mehr erfahren</a>{% endif %}</article>{% endfor %}<a class="btn" href="{{ url_for('index') }}">Zur Unterkunft</a></main></body></html>
