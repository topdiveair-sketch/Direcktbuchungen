<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Frühstück</title></head><body class="mode-page"><header class="mode-header"><div><span>Gloria – Frühstücksmodus</span><h1>{{ total_people }} Frühstücke</h1></div><a href="{{ url_for('host_assistant') }}">Zurück</a></header><main class="mode-main"><section class="breakfast-list">{% for r in runs %}<article class="{% if r.status=='erledigt' %}done{% endif %}"><div><strong>{{ r.room }}</strong><span>{{ r.adults }} Person(en)</span><small>{{ r.preference or 'keine Besonderheit hinterlegt' }}</small></div>{% if r.status!='erledigt' %}<form action="{{ url_for('breakfast_done',run_id=r.id) }}" method="post"><button>Serviert ✓</button></form>{% else %}<span class="served">erledigt</span>{% endif %}</article>{% else %}<p>Heute kein Frühstück.</p>{% endfor %}</section></main></body></html>
