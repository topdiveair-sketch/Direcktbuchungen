<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Mitarbeiter-Anmeldung</title></head><body class="plain-page"><main class="login-shell"><form method="post" class="admin-login"><h1>Mitarbeiter-Anmeldung</h1>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endwith %}<label>Benutzername<input name="username" required autofocus></label><label>Passwort<input type="password" name="password" required></label><button class="btn full">Anmelden</button><a href="{{ url_for('admin_login') }}">Admin-Anmeldung</a></form></main></body></html>
