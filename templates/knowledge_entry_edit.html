<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>{{ row.title }}</title></head><body class="admin-page"><header class="admin-header"><strong>{{ row.title }}</strong><a href="{{ url_for('knowledge_entries') }}">Zurück</a></header><main class="admin-main"><section class="admin-panel"><form method="post" class="settings-grid"><label>Assistent<select name="assistant"><option {% if row.assistant=='Fidel' %}selected{% endif %}>Fidel</option><option {% if row.assistant=='Gloria' %}selected{% endif %}>Gloria</option><option {% if row.assistant=='Pia' %}selected{% endif %}>Pia</option><option {% if row.assistant=='Allgemein' %}selected{% endif %}>Allgemein</option></select></label><label>Kategorie<input name="category" value="{{ row.category }}"></label><label>Titel<input name="title" value="{{ row.title }}"></label><label>Kurztext<input name="summary" value="{{ row.summary }}"></label><label>Ort<input name="location" value="{{ row.location }}"></label><label>Telefon<input name="phone" value="{{ row.phone }}"></label><label>Link<input name="link" value="{{ row.link }}"></label><label>Öffnungszeiten<input name="opening_hours" value="{{ row.opening_hours }}"></label><label>Sortierung<input type="number" name="sort_order" value="{{ row.sort_order }}"></label><label class="wide">Tags<input name="tags" value="{{ row.tags }}"></label><label class="wide">Inhalt<textarea name="content" rows="12">{{ row.content }}</textarea></label><label class="switch-row"><input type="checkbox" name="active" {% if row.active %}checked{% endif %}> aktiv</label><button class="btn">Speichern</button></form></section></main></body></html>
