<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Inventar</title></head><body class="admin-page"><header class="admin-header"><strong>Zimmerinventar</strong><a href="{{ url_for('os_dashboard') }}">OS-Dashboard</a></header><main class="admin-main"><section class="admin-panel"><h2>Inventar ergänzen</h2><form method="post" class="season-form"><select name="room">{% for room in rooms %}<option>{{ room }}</option>{% endfor %}</select><input name="item" placeholder="Gegenstand" required><input type="number" name="quantity" value="1"><input type="number" name="minimum_quantity" value="1"><button class="btn">Hinzufügen</button></form></section><section class="admin-panel"><div class="inventory-grid">{% for i in inventory %}<form class="inventory-card {% if i.quantity<i.minimum_quantity or i.condition!='gut' %}alert{% endif %}" action="{{ url_for('inventory_update',item_id=i.id) }}" method="post"><strong>{{ i.room }}</strong><h3>{{ i.item }}</h3><label>Bestand<input type="number" name="quantity" value="{{ i.quantity }}"></label><label>Mindestbestand<input type="number" name="minimum_quantity" value="{{ i.minimum_quantity }}"></label><label>Zustand<select name="condition"><option {% if i.condition=='gut' %}selected{% endif %}>gut</option><option {% if i.condition=='prüfen' %}selected{% endif %}>prüfen</option><option {% if i.condition=='defekt' %}selected{% endif %}>defekt</option></select></label><label>Notiz<input name="note" value="{{ i.note }}"></label><button>Speichern</button></form>{% endfor %}</div></section></main></body></html>
