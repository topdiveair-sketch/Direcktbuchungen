<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Aufgaben</title></head><body class="admin-page"><header class="admin-header"><strong>Aufgabenzentrale</strong><a href="{{ url_for('os_dashboard') }}">OS-Dashboard</a></header><main class="admin-main"><section class="admin-panel"><h2>Neue Aufgabe</h2><form method="post" class="settings-grid"><label>Titel<input name="title" required></label><label>Kategorie<select name="category"><option>Allgemein</option><option>Reinigung</option><option>Frühstück</option><option>Einkauf</option><option>Wartung</option><option>Marketing</option></select></label><label>Priorität<select name="priority"><option value="niedrig">niedrig</option><option value="normal" selected>normal</option><option value="hoch">hoch</option></select></label><label>Fällig<input type="date" name="due_date"></label><label>Zuständig<input name="assigned_to"></label><label class="wide">Beschreibung<textarea name="description"></textarea></label><button class="btn">Anlegen</button></form></section><section class="admin-panel"><h2>Aufgaben</h2>{% for t in tasks %}<div class="task-card {{ t.priority }}"><div><strong>{{ t.title }}</strong><span>{{ t.category }} · {{ t.status }}</span><small>{{ t.description }}{% if t.due_date %} · fällig {{ t.due_date }}{% endif %}</small></div><div class="task-actions"><form action="{{ url_for('task_action',task_id=t.id,action='open') }}" method="post"><button>Offen</button></form><form action="{{ url_for('task_action',task_id=t.id,action='start') }}" method="post"><button>Start</button></form><form action="{{ url_for('task_action',task_id=t.id,action='done') }}" method="post"><button>Erledigt</button></form></div></div>{% else %}<p>Keine Aufgaben.</p>{% endfor %}</section></main></body></html>
