<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"><title>Stammdaten</title></head><body class="admin-page"><header class="admin-header"><strong>Stammdaten</strong><a href="{{ url_for('knowledge_dashboard') }}">Wissensverwaltung</a></header><main class="admin-main"><section class="admin-panel"><h2>Neues Stammdatum</h2><form method="post" class="settings-grid"><label>Kategorie<input name="category" list="categories" required><datalist id="categories">{% for c in categories %}<option>{{ c }}</option>{% endfor %}</datalist></label><label>Bezeichnung<input name="key" required></label><label>Wert<input name="value"></label><label>Einheit<input name="unit"></label><label>Sortierung<input type="number" name="sort_order" value="100"></label><label class="wide">Notiz<input name="note"></label><button class="btn">Speichern</button></form></section><section class="admin-panel"><form class="search-row"><select name="category"><option value="">Alle Kategorien</option>{% for c in categories %}<option {% if selected_category==c %}selected{% endif %}>{{ c }}</option>{% endfor %}</select><button class="btn">Filtern</button></form><div class="master-grid">{% for r in rows %}<form class="master-card" action="{{ url_for('master_data_update',item_id=r.id) }}" method="post"><span>{{ r.category }}</span><h3>{{ r.key }}</h3><label>Wert<input name="value" value="{{ r.value }}"></label><label>Einheit<input name="unit" value="{{ r.unit }}"></label><label>Sortierung<input type="number" name="sort_order" value="{{ r.sort_order }}"></label><label>Notiz<input name="note" value="{{ r.note }}"></label><label class="switch-row"><input type="checkbox" name="active" {% if r.active %}checked{% endif %}> aktiv</label><button>Aktualisieren</button></form>{% endfor %}</div></section></main></body></html>
